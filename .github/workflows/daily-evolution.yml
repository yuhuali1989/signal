name: 🧬 Daily Evolution — AI Content Generation & Deploy

on:
  # 每日北京时间早上 6 点自动运行 (UTC 22:00)
  schedule:
    - cron: '0 22 * * *'
  # 也可以手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '生成模式'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - column
          - article
          - book

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: AI 内容生成
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install Python dependencies
        run: pip install -r agents/requirements.txt

      - name: 🤖 Run AI Agents
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python agents/run_crew.py --mode ${{ github.event.inputs.mode || 'all' }} --count 2

      - name: 📝 Commit generated content
        run: |
          git config user.name "Signal AI Bot"
          git config user.email "signal-bot@users.noreply.github.com"
          git add content/
          git diff --staged --quiet || git commit -m "🧬 Daily evolution: $(date +'%Y-%m-%d %H:%M')"
          git push

  # Job 2: 构建并部署到 GitHub Pages
  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # 确保拉取最新的 content

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build static site
        run: npm run build

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
