name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 支持手动触发部署
  workflow_dispatch:

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署，避免冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

# 📌 部署到子路径 https://yuhuali1989.github.io/signal/
#    所有资源（CSS/JS/图片）必须以 /signal 为前缀，否则页面样式会崩溃
env:
  NEXT_PUBLIC_BASE_PATH: /signal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ env.NEXT_PUBLIC_BASE_PATH }}

      - name: 🚫 Add .nojekyll
        # GitHub Pages 默认使用 Jekyll，会忽略 _next 目录
        # 添加 .nojekyll 文件禁用 Jekyll 处理
        run: touch ./out/.nojekyll

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
